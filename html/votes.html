<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/css.css">
    <link rel="icon" href="data:,">
    <title>BaloLudo - Votes Formation</title>
</head>

<body class="page-votes">
    <header class="topbar">
        <div class="brand">
            <img src="../img/Logo.png" alt="Logo BaloLudo">
            <div class="brand-copy">
                <strong>BaloLudo</strong>
                <span>Vote en ligne pour ludo</span>
            </div>
        </div>

        <h1 class="page-title">Votes Formation</h1>

        <a class="topbar-button" href="./index.html">Retour a l'accueil</a>
    </header>

    <main class="page-main">
        <div class="formation-heading">
            <span class="formation-heading-label">Formation</span>
            <span id="titreFormation"></span>
            <a class="board-link" href="./formations.html">Retour aux formations</a>
        </div>

        <section class="app-board">
            <div class="board-surface">
                <div id="votes-directory" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <div id="popupVoteDetails" class="popup">
        <div class="popup-content popup-content-vote-details">
            <button id="closePopupVoteDetails" class="popup-close" type="button" aria-label="Fermer">&times;</button>
            <h2 id="voteDetailsTitle">Details du vote</h2>
            <p id="voteDetailsStatus" class="vote-popup-meta"></p>

            <div class="vote-detail-grid">
                <div class="vote-detail-item">
                    <span class="vote-detail-item-label">Ouverture</span>
                    <span id="voteDetailsOpening" class="vote-detail-item-value"></span>
                </div>

                <div class="vote-detail-item">
                    <span class="vote-detail-item-label">Fin</span>
                    <span id="voteDetailsEnd" class="vote-detail-item-value"></span>
                </div>

                <div class="vote-detail-item">
                    <span class="vote-detail-item-label">Participation</span>
                    <span id="voteDetailsParticipation" class="vote-detail-item-value"></span>
                </div>
            </div>

            <section class="vote-detail-section">
                <h3>Eleves pr&eacute;sent&eacute;s</h3>
                <p class="vote-detail-note">Liste des eleves inclus dans ce vote.</p>
                <div id="votePresentList" class="vote-present-list"></div>
            </section>
        </div>
    </div>

    <script src="../javascript/votes.js"></script>
</body>

</html>
