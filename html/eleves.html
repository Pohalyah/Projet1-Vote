<!DOCTYPE HTML>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/css.css">
    <title>Projet 1</title>
</head>

<body>
    <h1>Élèves de la formation</h1>
    <h2 id="titreFormation"></h2>

    <div id="popupEleveCreate" class="popup">
        <div class="popup-content">
            <span id="closePopupEleve">&times;</span>
            <h2>Ajouter un élève</h2>
            <form id="formEleveCreate">
                <input id="formEleveNom" type="text" placeholder="Nom" required>
                <input id="formElevePrenom" type="text" placeholder="Prénom" required>
                <input id="formEleveEmail" type="email" placeholder="Email" required>
                <button id="buttonCreateEleve" type="submit">Créer</button>
            </form>
        </div>
    </div>


    <div id="eleve-directory"></div>

    <script src="../javascript/js2.js"></script>
</body>

</html>
