<!DOCTYPE HTML>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/css.css">
    <title>Projet 1</title>
</head>

<body>
    <h1>Liste des formations</h1>

    <button id="formationCreate">Créer formation</button>
    <div id="popupFormationCreate" class="popup">
        <div class="popup-content">
            <span id="closePopup">&times;</span>
            <h2>Créer formation</h2>
            <form id="formFormationCreate">
                <input id="formCreateNom" type="text" placeholder="Nom de la formation" required>
                <input id="formCreateDateDebut" type="date" placeholder="Date de début" required>
                <input id="formCreateDateFin" type="date" placeholder="Date de fin" required>
                <button id="buttonCreateFormation" type="submit">Créer</button>
            </form>
        </div>
    </div>


    <div id="formation-directory"></div>
    <script src="../javascript/js.js"></script>
</body>

</html>
