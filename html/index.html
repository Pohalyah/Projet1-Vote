<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/css.css">
    <link rel="icon" href="data:,">
    <title>BaloLudo - Accueil</title>
</head>

<body class="page-home">
    <header class="topbar">
        <div class="brand">
            <img src="../img/Logo.png" alt="Logo BaloLudo">
            <div class="brand-copy">
                <strong>BaloLudo</strong>
                <span>Vote en ligne pour ludo</span>
            </div>
        </div>

        <h1 class="page-title">Page d'Accueil</h1>

        <button class="topbar-button topbar-button-disabled" type="button" title="Fonctionnalite a venir">Login</button>
    </header>

    <main class="page-main">
        <section class="app-board">
            <div class="board-surface board-surface-home">
                <div class="home-layout">
                    <div class="home-actions">
                        <a class="home-card" href="./formations.html">
                            <span class="home-card-title">Mes Formations</span>
                            <img class="home-card-icon" src="../img/oeil.png" alt="">
                        </a>

                        <button class="home-card home-card-disabled" type="button" title="Fonctionnalite a venir">
                            <span class="home-card-title">Ajout d'un formateur</span>
                            <span class="add-icon" aria-hidden="true">+</span>
                            <span class="home-card-note">Bientot disponible</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
